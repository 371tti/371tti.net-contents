title: Color Viewer
description: 色を確認するためのツール
authors:
- 371tti
is_complete: true
---

<style>
    html,
    body {
        height: 100%;
        margin: 0;
        padding: 0;
    }

    .full {
        min-height: 100vh;
        min-width: 100vw;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        background: #000;
    }

    #ui-area {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
    }
</style>
<div class="full" id="color-bg">
    <div id="ui-area">
        <input type="color" id="colorPicker" value="#FFF">
    </div>
    <div id="cover"
        style="opacity:0; pointer-events:none; position:fixed; top:0; left:0; width:100vw; height:100vh; z-index:9999999999;">
    </div>
</div>

<script>
    const colorBg = document.getElementById('color-bg');
    const colorPicker = document.getElementById('colorPicker');
    const uiArea = document.getElementById('ui-area');
    const cover = document.getElementById('cover');
    let coverMode = false;

    // URLから色を取得
    const urlParams = new URLSearchParams(window.location.search);
    const initialColor = urlParams.get('color') || '#000';

    // 初期化
    colorBg.style.background = initialColor;
    colorPicker.value = initialColor;
    if (urlParams.has('color')) {
        setCover(true);
    }

    colorPicker.addEventListener('input', function (e) {
        const color = e.target.value;
        colorBg.style.background = color;
        if (coverMode) cover.style.background = color;
        // URLを更新
        history.replaceState(null, '', `?color=${encodeURIComponent(color)}`);
    });

    function setCover(on) {
        coverMode = !!on;
        cover.style.opacity = coverMode ? '1' : '0';
        cover.style.pointerEvents = coverMode ? 'auto' : 'none';
        if (coverMode) cover.style.background = colorPicker.value;
    }

    // UI領域以外をクリックでON（カバー表示中は無視）
    colorBg.addEventListener('click', function (e) {
        if (coverMode) return; // カバー表示中は親のクリックを無視
        if (uiArea.contains(e.target)) return; // UI操作は無視
        setCover(true);
    });

    // カバーをタップで解除（伝播を止める）
    cover.addEventListener('click', function (e) {
        e.stopPropagation();
        setCover(false);
    });
</script>
