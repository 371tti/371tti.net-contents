<main>
    <div class="box">
        <h1>UTF8 Steganography</h1>

                    <a id="encodeBtn" class="button" href="#" style="margin:0;">埋め込む</a>

                    <a id="clearInputsBtn" class="button" href="#" style="margin:0;">入力をクリア</a>
                </div>

                <div class="action-row">
                    <a id="decodeBtn" class="button" href="#" style="margin:0;">復元</a>
                    <a id="copyDecodedBtn" class="button" href="#" style="margin:0;">結果をコピー</a>
                </div>

                <textarea id="decodedOutput" readonly placeholder="復元した文章がここに表示されます"
                    style="width:100%; min-height:120px; margin-top:8px;"></textarea>
                <p id="decodeStatus" class="status-text" data-tone="info">準備ができています。</p>

<script>
    const hiddenText = document.getElementById('hiddenText');
    const carrierText = document.getElementById('carrierText');
    const encodeBtn = document.getElementById('encodeBtn');
    const clearInputsBtn = document.getElementById('clearInputsBtn');
    const copyCarrierBtn = document.getElementById('copyCarrierBtn');
    const decodeInput = document.getElementById('decodeInput');
    const decodeBtn = document.getElementById('decodeBtn');
    const decodedOutput = document.getElementById('decodedOutput');
    const copyDecodedBtn = document.getElementById('copyDecodedBtn');
    const statusEl = document.getElementById('status');
    const encodedOutput = document.getElementById('encodedOutput');
    const copyEncodedBtn = document.getElementById('copyEncodedBtn');
    const encodeStatusEl = document.getElementById('encodeStatus');
    const decodeStatusEl = document.getElementById('decodeStatus');

    // ゼロ幅文字
    const ZWSP = '\u200B'; // Zero Width Space (0)
    const ZWNJ = '\u200C'; // Zero Width Non-Joiner (1)

    function textToBinary(text) {
        const encoder = new TextEncoder();
        const bytes = encoder.encode(text);
        let binary = '';
        for (const byte of bytes) {
            binary += byte.toString(2).padStart(8, '0');
        }
        return binary;
    }

    function binaryToText(binary) {
        const bytes = [];
        for (let i = 0; i < binary.length; i += 8) {
            const byteStr = binary.substring(i, i + 8);
            if (byteStr.length === 8) {
                bytes.push(parseInt(byteStr, 2));
            }
        }
        const decoder = new TextDecoder();
        return decoder.decode(new Uint8Array(bytes));
    }

    function encodeHidden(text) {
        const binary = textToBinary(text);
        let encoded = '';
        for (const bit of binary) {
            encoded += bit === '0' ? ZWSP : ZWNJ;
        }
        return encoded;
    }

    function decodeHidden(encoded) {
        let binary = '';
        for (const char of encoded) {
            if (char === ZWSP) binary += '0';
            else if (char === ZWNJ) binary += '1';
        }
        if (!binary) return '';
        return binaryToText(binary);
    }

    function setStatus(el, message, tone = 'info') {
        if (!el) return;
        el.textContent = message;
        el.dataset.tone = tone;
    }

    async function copyToClipboard(text, successMessage, statusTarget = statusEl) {
        if (!text) {
            setStatus(statusTarget, 'コピーする内容がありません。', 'info');
            return;
        }
        try {
            if (navigator.clipboard?.writeText) {
                await navigator.clipboard.writeText(text);
            } else {
                const temp = document.createElement('textarea');
                temp.value = text;
                temp.setAttribute('readonly', '');
                temp.style.position = 'fixed';
                temp.style.opacity = '0';
                document.body.appendChild(temp);
                temp.select();
                document.execCommand('copy');
                document.body.removeChild(temp);
            }
            setStatus(statusTarget, successMessage, 'success');
        } catch (err) {
            setStatus(statusTarget, `コピーに失敗しました: ${err.message}`, 'error');
        }
    }

    encodeBtn.addEventListener('click', async (event) => {
        event.preventDefault();
        const hidden = hiddenText.value;
        const carrier = carrierText.value;
        if (!hidden) {
            setStatus(encodeStatusEl, '隠したい文章を入力してください。', 'error');
            hiddenText.focus();
            return;
        }
        if (!carrier) {
            setStatus(encodeStatusEl, 'キャリア文章を入力してください。', 'error');
            carrierText.focus();
            return;
        }
        const encodedHidden = encodeHidden(hidden);
        const result = carrier + encodedHidden;
        encodedOutput.value = result;
        await copyToClipboard(result, '埋め込み結果をコピーしました。', encodeStatusEl);
        setStatus(statusEl, '埋め込みが完了しました。', 'success');
    });

    clearInputsBtn.addEventListener('click', (event) => {
        event.preventDefault();
        hiddenText.value = '';
        carrierText.value = '';
        decodeInput.value = '';
        encodedOutput.value = '';
        decodedOutput.value = '';
        setStatus(encodeStatusEl, '入力欄を初期化しました。', 'info');
        setStatus(decodeStatusEl, '入力欄を初期化しました。', 'info');
        setStatus(statusEl, '入力をクリアしました。', 'info');
    });

    copyEncodedBtn.addEventListener('click', (event) => {
        event.preventDefault();
        copyToClipboard(encodedOutput.value, '埋め込み結果をコピーしました。', encodeStatusEl);
    });

    decodeBtn.addEventListener('click', (event) => {
        event.preventDefault();
        const input = decodeInput.value;
        if (!input) {
            setStatus(decodeStatusEl, '復元したい文章を入力してください。', 'error');
            decodeInput.focus();
            return;
        }
        const matches = input.match(/[\u200B\u200C]+/g);
        if (!matches) {
            setStatus(decodeStatusEl, '隠された文章が見つかりませんでした。', 'error');
            return;
        }
        const encoded = matches.join('');
        try {
            const decoded = decodeHidden(encoded);
            decodedOutput.value = decoded;
            setStatus(decodeStatusEl, '復元に成功しました。', 'success');
            setStatus(statusEl, '復元に成功しました。', 'success');
        } catch (e) {
            setStatus(decodeStatusEl, `デコードエラー: ${e.message}`, 'error');
        }
    });

    copyDecodedBtn.addEventListener('click', (event) => {
        event.preventDefault();
        copyToClipboard(decodedOutput.value, '復元結果をコピーしました。', decodeStatusEl);
    });
</script>
