<style>
    html,
    body {
        height: 100%;
        margin: 0;
        padding: 0;
    }

    .background {
        min-height: 100vh;
        min-width: 100vw;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(to bottom, var(--color-accent-0) -107% -77%, transparent 88%);
    }

    #content {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }

    #clock {
        font-size: 2em;
        text-align: center;
        margin: 20px 0;
        cursor: pointer;
    }

    #date {
        font-size: 0.9em;
        text-align: center;
        color: var(--text-color-0);
        cursor: pointer;
    }
</style>

<div class="background full">
    <div id="content">
        <div id="clock"></div>
        <div id="date"></div>
        <script>
            let showJapaneseDay = false;
            const modes = [
                {
                    id: 'local-24',
                    label: 'Local 24h',
                    render: (now) => {
                        const h = String(now.getHours()).padStart(2, '0');
                        const m = String(now.getMinutes()).padStart(2, '0');
                        const s = String(now.getSeconds()).padStart(2, '0');
                        return `${h}:${m}:${s}`;
                    }
                },
                {
                    id: 'local-12',
                    label: 'Local 12h',
                    render: (now) => {
                        let h = now.getHours();
                        const ampm = h >= 12 ? 'PM' : 'AM';
                        h = h % 12;
                        h = h === 0 ? 12 : h;
                        const hh = String(h).padStart(2, '0');
                        const m = String(now.getMinutes()).padStart(2, '0');
                        const s = String(now.getSeconds()).padStart(2, '0');
                        return `${hh}:${m}:${s} ${ampm}`;
                    }
                },
                {
                    id: 'utc-24',
                    label: 'UTC 24h',
                    render: (now) => {
                        const h = String(now.getUTCHours()).padStart(2, '0');
                        const m = String(now.getUTCMinutes()).padStart(2, '0');
                        const s = String(now.getUTCSeconds()).padStart(2, '0');
                        return `UTC ${h}:${m}:${s}`;
                    }
                },
                {
                    id: 'utc-ms',
                    label: 'UTC ms',
                    render: (now) => {
                        const h = String(now.getUTCHours()).padStart(2, '0');
                        const m = String(now.getUTCMinutes()).padStart(2, '0');
                        const s = String(now.getUTCSeconds()).padStart(2, '0');
                        const ms = String(now.getUTCMilliseconds()).padStart(3, '0');
                        return `UTC ${h}:${m}:${s}.${ms}`;
                    }
                },
                {
                    id: 'iso',
                    label: 'ISO',
                    render: (now) => now.toISOString()
                },
                {
                    id: 'unix-s',
                    label: 'Unix 秒',
                    render: (now) => String(Math.floor(now.getTime() / 1000))
                },
                {
                    id: 'unix-ms',
                    label: 'Unix ms',
                    render: (now) => String(now.getTime())
                }
            ];

            let currentMode = 0;

            function getDayString(dayIndex) {
                const daysEn = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
                const daysJa = ['日', '月', '火', '水', '木', '金', '土'];
                return showJapaneseDay ? daysJa[dayIndex] : daysEn[dayIndex];
            }

            function updateClock() {
                const now = new Date();
                const mode = modes[currentMode];
                const clockEl = document.getElementById('clock');
                // 表示は時計要素に。補助情報は title で表示（hover やスクリーンリーダーに有用）
                clockEl.textContent = mode.render(now);
                clockEl.title = `${mode.label} — クリックで切替`;
                const y = now.getFullYear();
                const mon = String(now.getMonth() + 1).padStart(2, '0');
                const d = String(now.getDate()).padStart(2, '0');
                const dayStr = getDayString(now.getDay());
                document.getElementById('date').textContent = `${y}/${mon}/${d} (${dayStr})`;
            }

            // クリックでモード切替（時計部分）
            document.getElementById('clock').onclick = function () {
                currentMode = (currentMode + 1) % modes.length;
                updateClock();
            };
            // 日付クリックは和日名切替を維持
            document.getElementById('date').onclick = function () {
                showJapaneseDay = !showJapaneseDay;
                updateClock();
            };

            // 定期更新（ミリ秒が見えるモードのため100ms程度で更新）
            setInterval(updateClock, 10);
            updateClock();
        </script>
    </div>
</div>
