<style>
    #display {
        position: fixed;
        inset: 0;
        display: none;
        justify-content: center;
        align-items: center;
        background: var(--color-bg-0);
        color: var(--color-text-1);
        cursor: zoom-out;
        text-align: center;
        z-index: 999999;
    }

    #display.show {
        display: flex;
    }

    #display-inner {
        width: 100%;
        height: 100%;
        padding: 4vh 6vw;
        box-sizing: border-box;
        display: flex;
        align-items: center;
        justify-content: center;
        word-break: break-word;
    }

    #display-text {
        padding: 0;
        white-space: pre-wrap;
        line-height: 1.05;
    }
</style>


<main>
    <h1>Show</h1>
    <p>
        入力したテキストを画面いっぱいに表示します。ダブルクリックで表示を閉じます。
    </p>
    <hr>
    <section class="block" style="gap: 1rem; display: grid;">
        <label class="block" style="gap: 0.5rem;">
            <textarea id="text-input" rows="6" style="width: 100%;" placeholder="ここに表示したい文字を入力 (複数行OK)"></textarea>
        </label>
        <div style="text-align: center; display: flex; flex-wrap: wrap; gap: 0.75rem; justify-content: center;">
            <a id="show-btn" class="button" href="#">フルスクリーンで表示</a>
            <a id="copy-link-btn" class="button" href="#">リンクをコピー</a>
        </div>
    </section>
</main>

<div id="display">
    <div id="display-inner">
        <h1 id="display-text"></h1>
    </div>
</div>

<script>
    const utf8ToB64 = (s) => btoa(unescape(encodeURIComponent(s)));
    const b64ToUtf8 = (b) => decodeURIComponent(escape(atob(b)));

    const els = {
        input: document.getElementById('text-input'),
        show: document.getElementById('show-btn'),
        copy: document.getElementById('copy-link-btn'),
        display: document.getElementById('display'),
        displayText: document.getElementById('display-text'),
    };

    function updateUrl(text) {
        const params = new URLSearchParams(location.search);
        if (text) {
            params.set('t', utf8ToB64(text));
        } else {
            params.delete('t');
        }
        history.replaceState(null, '', `${location.pathname}${params.size ? `?${params}` : ''}`);
    }

    function loadFromParam() {
        const value = new URLSearchParams(location.search).get('t');
        if (!value) return;
        try {
            const decoded = b64ToUtf8(value);
            els.input.value = decoded;
            showFullscreen();
        } catch (error) {
            console.warn('Failed to decode Base64 text.', error);
        }
    }

    function fitText() {
        const container = els.displayText;
        const parent = container.parentElement;
        container.style.fontSize = '10px';
        const usableWidth = parent.clientWidth;
        const usableHeight = parent.clientHeight;
        let low = 10;
        let high = 1000;
        let best = 10;
        while (low <= high) {
            const mid = (low + high) >> 1;
            container.style.fontSize = `${mid}px`;
            const overflow = container.scrollWidth > usableWidth + 1 || container.scrollHeight > usableHeight + 1;
            if (overflow) {
                high = mid - 1;
            } else {
                best = mid;
                low = mid + 1;
            }
        }
        container.style.fontSize = `${best}px`;
    }

    function showFullscreen() {
        const text = els.input.value.trim();
        if (!text) return;
        els.displayText.textContent = text;
        els.display.classList.add('show');
        requestAnimationFrame(fitText);
        updateUrl(text);
    }

    function hideFullscreen() {
        els.display.classList.remove('show');
    }

    els.show.addEventListener('click', (event) => {
        event.preventDefault();
        showFullscreen();
    });

    els.copy.addEventListener('click', async (event) => {
        event.preventDefault();
        const text = els.input.value.trim();
        updateUrl(text);
        try {
            await navigator.clipboard.writeText(location.href);
            els.copy.textContent = 'コピーしました';
            setTimeout(() => {
                els.copy.textContent = 'リンクをコピー';
            }, 1800);
        } catch (error) {
            console.warn('Clipboard write failed.', error);
        }
    });

    els.input.addEventListener('keydown', (event) => {
        if (event.ctrlKey && event.key === 'Enter') {
            showFullscreen();
        }
    });

    els.display.addEventListener('dblclick', hideFullscreen);
    window.addEventListener('resize', () => {
        if (els.display.classList.contains('show')) {
            fitText();
        }
    });

    loadFromParam();
</script>
